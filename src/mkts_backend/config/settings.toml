# Settings for mkts-backend
# This file configures the market data collection system for multiple markets.

[esi]
user_agent = "wcmkts_backend/0.1.3, orthel.toralen@gmail.com, (https://github.com/OrthelT/wcmkts_backend)"
compatibility_date = "2026-06-09"

[auth]
# esi_client_id, esi_secret_key, and refresh token should be set in .env file for local development.
# Use secure credential storage (github secrets) in production.
callback_url = "http://localhost:8000/callback"
token_file = "file:token.json"

[app]
name = "WinterCo Markets Backend"
environment = "production" # "production" or "development"
log_level = "DEBUG" # INFO or DEBUG

# ============================================================================
# MARKETS CONFIGURATION
# ============================================================================
# Each market section defines all configuration needed for that market.
# To add a new market, create a new [markets.<alias>] section.

[markets]
default = "primary"

[markets.primary]
name = "4-HWWF - Platestar"
region_id = 10000003          # Vale of Silent
system_id = 30000240
structure_id = 1053654548169
database_alias = "wcmktnewkeep"
database_file = "wcmktnewkeeptest.db"
turso_url_env = "TURSO_WCMKTNEWKEEPTEST_URL"
turso_token_env = "TURSO_WCMKTNEWKEEPTEST_TOKEN"
gsheets_url = "https://docs.google.com/spreadsheets/d/1I5XwtI9dfAVE4E73v3Lwr8z3od-ibr3h_evBeaAuhaw/edit" # wc_northern_supply

[markets.deployment]
name = "X47L-Q - Rogue Threshold"
region_id = 10000023
system_id = 30001967
structure_id = 1041669946862
database_alias = "wcmktnorth"
database_file = "wcmktnorth2test.db"
turso_url_env = "TURSO_WCMKTNORTHTEST_URL"
turso_token_env = "TURSO_WCMKTNORTHTEST_TOKEN"
gsheets_url = "https://docs.google.com/spreadsheets/d/1I5XwtI9dfAVE4E73v3Lwr8z3od-ibr3h_evBeaAuhaw/edit"

[markets.market3]
name = "BKG-Q2 - Insidious Prime"
region_id = 10000055  # Branch
system_id = 30004333 # BKG-Q2
structure_id = 1032721770598 # Insidious Prime
database_alias = "wcmktbkg"
database_file = "wcmktbkgtest.db"
turso_url_env = "TURSO_WCMKTBKGTEST_URL"
turso_token_env = "TURSO_WCMKTBKGTEST_TOKEN"
gsheets_url = "https://docs.google.com/spreadsheets/d/1I5XwtI9dfAVE4E73v3Lwr8z3od-ibr3h_evBeaAuhaw/edit" # wc_northern_supply

[markets.primary.gsheets_worksheets]
market_orders = "market_orders_4h"
market_data = "market_data_4h"
doctrines = "doctrines_mkt_4H"
# ============================================================================
# SHARED DATABASE CONFIGURATION
# ============================================================================
# Market-independent databases (same for every market). All per-market DB
# config lives in [markets.<alias>] above — this is the only other pathway.

# Shared databases (same for all markets)
[shared]
sde_file = "sdelitetest.db"
fittings_file = "wcfittingtest.db"
buildcost_file = "buildcosttest.db"

# Test/dev database. When environment="development", the default market routes
# here instead of its production DB (see MarketContext.from_settings).
[shared.testing]
database_alias = "wcmkttest"
database_file = "wcmkttest.db"
turso_url_env = "TURSO_WCMKTTEST_URL"
turso_token_env = "TURSO_WCMKTTEST_TOKEN"

# ============================================================================
# GOOGLE SHEETS CONFIGURATION
# ============================================================================
# Note: Market-specific sheets are configured in [markets.<alias>] sections.
# These settings are for global Google Sheets configuration.

[google_sheets]
enabled = false

# Source sheet for the `add_structure` CLI (imports rows into buildcost.db structures table).
[buildcost]
sheet_url = "https://docs.google.com/spreadsheets/d/1aFuInUsgvI1mb-nFNBSwRCGy9YqauykGRson3Eb0b5A/edit?gid=0#gid=0"
default_worksheet = ""  # empty = first worksheet in the spreadsheet

# ============================================================================
# UPDATE BEHAVIOR
# ============================================================================
# Tables listed here are fully wiped and re-inserted on each upsert run,
# rather than incrementally upserted. Useful when stale rows must disappear
# (e.g., resetting deployment history when switching regions).
# options = ["marketstats", "doctrines", "jita_prices", "marketorders", "market_history"]

[wipe_replace]
tables = ["marketstats", "doctrines", "jita_prices", "builder_costs"]


