name: Builder Costs Collection

on:
  schedule:
    - cron: '45 6 * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  collect-builder-costs:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - run: uv sync
      - run: uv pip install -e .
      - run: mkdir -p logs data databackup
      # Each DB is cached as `<file>.db*` so the pyturso sync engine's sidecar
      # files (-info, -changes, -wal, -wal-revert) travel with the db file.
      - name: Restore cached databases
        uses: actions/cache/restore@v5
        with:
          path: |
            sdelitetest.db*
            wcmktnewkeeptest.db*
            buildcosttest.db*
          key: builder-cost-dbs-v4-${{ github.run_id }}
          restore-keys: |
            builder-cost-dbs-v4-
      - name: Run builder costs collection
        run: uv run mkts-backend update-builder-costs
        env:
          TURSO_WCMKTNEWKEEP_URL: ${{ secrets.TURSO_WCMKTNEWKEEP_URL }}
          TURSO_WCMKTNEWKEEP_TOKEN: ${{ secrets.TURSO_WCMKTNEWKEEP_TOKEN }}
          TURSO_SDE_URL: ${{ secrets.TURSO_SDE_URL }}
          TURSO_SDE_TOKEN: ${{ secrets.TURSO_SDE_TOKEN }}
          TURSO_BUILDCOST_URL: ${{ secrets.TURSO_BUILDCOST_URL }}
          TURSO_BUILDCOST_TOKEN: ${{ secrets.TURSO_BUILDCOST_TOKEN }}
      - name: Save cached databases
        uses: actions/cache/save@v5
        if: success()
        with:
          path: |
            sdelitetest.db*
            wcmktnewkeeptest.db*
            buildcosttest.db*
          key: builder-cost-dbs-v4-${{ github.run_id }}
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: builder-costs-logs
          path: logs/
