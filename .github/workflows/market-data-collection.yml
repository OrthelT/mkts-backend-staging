name: Market Data Collection

on:
  schedule:
    # Run every hour without flags
    - cron: '20 */1 * * *'

  workflow_dispatch: # Allow manual triggering
    inputs:
      market:
        description: 'Market to process'
        required: true
        default: 'all'
        type: choice
        options:
          - primary
          - deployment
          - market3
          - all
      include_history:
        description: 'Include historical data processing'
        required: false
        default: false
        type: boolean

jobs:
  collect-market-data:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        market: ${{ fromJSON((github.event.inputs.market == 'all' || github.event.inputs.market == '') && '["primary", "deployment", "market3"]' || format('["{0}"]', github.event.inputs.market)) }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "latest"

    - name: Install dependencies
      run: uv sync

    - name: Install package (editable)
      run: uv pip install -e .

    - name: Smoke import check
      run: |
        uv run python - << 'PY'
        import importlib
        modules = [
            'mkts_backend',
            'mkts_backend.cli',
            'mkts_backend.config.db_config',
            'mkts_backend.config.settings_service',
            'mkts_backend.config.market_context',
            'mkts_backend.config.logging_config',
            'mkts_backend.db.models',
            'mkts_backend.db.db_handlers',
            'mkts_backend.db.db_queries',
            'mkts_backend.esi.esi_requests',
            'mkts_backend.processing.data_processing',
            'mkts_backend.utils.utils',
        ]
        for m in modules:
            importlib.import_module(m)
        print('Import check OK:', ', '.join(modules))
        PY

    - name: Create required directories
      run: |
        mkdir -p logs
        mkdir -p data
        mkdir -p databackup

    # Cache keys are bucketed by UTC date, not run_id: GitHub caches are immutable,
    # so a per-run key writes a brand-new entry every hour. A daily key reuses the
    # same entry within a day (restore-keys prefix still warm-starts from the most
    # recent), so each entry is recreated at most once per day. The DBs stay fresh
    # because libsql sync() pulls incrementally on every run regardless.
    #
    # Single-writer cache layout (no concurrency guard needed): every cache key has
    # exactly ONE matrix leg that writes it, so two legs can never race to reserve
    # the same key.
    #   * Each market DB is cached only by its own leg -> turso-dbs-v3-mkt-<market>-<date>
    #   * The shared SDE + fitting DBs are cached only by the primary leg and
    #     restored read-only by the others             -> turso-dbs-v3-shared-<date>
    - name: Compute cache date
      id: cachedate
      run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

    # Map the matrix market alias to its market-specific DB file. Done as a step
    # (not a matrix `include`) so single-market dispatch can't spawn phantom legs:
    # an `include` whose `market:` value isn't in the base matrix would be added as
    # a new combination, forcing every market to run on a single-market dispatch.
    - name: Resolve market DB file
      id: dbfile
      run: |
        case "${{ matrix.market }}" in
          primary)    echo "db=wcmktnewkeep.db" >> "$GITHUB_OUTPUT" ;;
          deployment) echo "db=wcmktnorth2.db"  >> "$GITHUB_OUTPUT" ;;
          market3)    echo "db=wcmktprod.db"    >> "$GITHUB_OUTPUT" ;;
          *) echo "Unknown market: ${{ matrix.market }}" >&2; exit 1 ;;
        esac

    # Shared DBs (rarely change): restored by every leg, written only by primary.
    - name: Restore shared databases (SDE + fittings)
      uses: actions/cache/restore@v5
      id: shared-cache
      with:
        path: |
          sdelite.db
          sdelite.db-info
          wcfitting.db
          wcfitting.db-info
        key: turso-dbs-v3-shared-${{ steps.cachedate.outputs.date }}
        restore-keys: |
          turso-dbs-v3-shared-

    # This leg's own market DB only.
    - name: Restore market database
      uses: actions/cache/restore@v5
      id: db-cache
      with:
        path: |
          ${{ steps.dbfile.outputs.db }}
          ${{ steps.dbfile.outputs.db }}-info
        key: turso-dbs-v3-mkt-${{ matrix.market }}-${{ steps.cachedate.outputs.date }}
        restore-keys: |
          turso-dbs-v3-mkt-${{ matrix.market }}-

    - name: Log cache status
      run: |
        echo "Market: ${{ matrix.market }} (DB: ${{ steps.dbfile.outputs.db }})"
        echo "Market cache hit: ${{ steps.db-cache.outputs.cache-hit }} (key: ${{ steps.db-cache.outputs.cache-matched-key }})"
        echo "Shared cache hit: ${{ steps.shared-cache.outputs.cache-hit }} (key: ${{ steps.shared-cache.outputs.cache-matched-key }})"
        echo "Database files after restore:"
        ls -lh *.db *.db-info 2>/dev/null || echo "No database files found (cache miss)"

    - name: Set up environment variables
      run: |
        echo "CLIENT_ID=${{ secrets.CLIENT_ID }}" >> $GITHUB_ENV
        echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> $GITHUB_ENV
        echo "TURSO_SDE_URL=${{ secrets.TURSO_SDE_URL }}" >> $GITHUB_ENV
        echo "TURSO_SDE_TOKEN=${{ secrets.TURSO_SDE_TOKEN }}" >> $GITHUB_ENV
        echo "TURSO_FITTING_URL=${{ secrets.TURSO_FITTING_URL }}" >> $GITHUB_ENV
        echo "TURSO_FITTING_TOKEN=${{ secrets.TURSO_FITTING_TOKEN }}" >> $GITHUB_ENV
        # primary market (4-HWWF WinterCo Central Station / wcmktnewkeep.db)
        echo "TURSO_WCMKTNEWKEEP_URL=${{ secrets.TURSO_WCMKTNEWKEEP_URL }}" >> $GITHUB_ENV
        echo "TURSO_WCMKTNEWKEEP_TOKEN=${{ secrets.TURSO_WCMKTNEWKEEP_TOKEN }}" >> $GITHUB_ENV
        # deployment market (X47L-Q Rogue Threshold / wcmktnorth2.db; env name TURSO_MARKET3_*)
        echo "TURSO_WCMKTNORTH_URL=${{ secrets.TURSO_WCMKTNORTH_URL }}" >> $GITHUB_ENV
        echo "TURSO_WCMKTNORTH_TOKEN=${{ secrets.TURSO_WCMKTNORTH_TOKEN }}" >> $GITHUB_ENV
        # market3 market (4-HWWF Platestar / wcmktprod.db)
        echo "TURSO_WCMKTPROD_URL=${{ secrets.TURSO_WCMKTPROD_URL }}" >> $GITHUB_ENV
        echo "TURSO_WCMKTPROD_TOKEN=${{ secrets.TURSO_WCMKTPROD_TOKEN }}" >> $GITHUB_ENV
        # Janice API key for Jita price fallback
        echo "JANICE_KEY=${{ secrets.JANICE_KEY }}" >> $GITHUB_ENV

    - name: Write Google Service Account JSON
      env:
        GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
      run: |
        # write to a file with strict perms
        echo "$GOOGLE_SA_JSON" > "$GITHUB_WORKSPACE/creds.json"
        chmod 600 "$GITHUB_WORKSPACE/creds.json"
        # most Google libs honor this automatically
        echo "GOOGLE_APPLICATION_CREDENTIALS=$GITHUB_WORKSPACE/creds.json" >> $GITHUB_ENV
        # if you use pygsheets, this also works:
        echo "PYGSHEETS_JSON=$GITHUB_WORKSPACE/creds.json" >> $GITHUB_ENV

    - name: Set up EVE SSO refresh token
      run: |
        echo "REFRESH_TOKEN=${{ secrets.REFRESH_TOKEN }}" >> $GITHUB_ENV
    - name: Debug environment variables
      run: |
        echo "Processing market: ${{ matrix.market }}"
        echo "Checking if required environment variables are set:"
        echo "CLIENT_ID is set: $([ -n "$CLIENT_ID" ] && echo "YES" || echo "NO")"
        echo "SECRET_KEY is set: $([ -n "$SECRET_KEY" ] && echo "YES" || echo "NO")"
        echo "REFRESH_TOKEN is set: $([ -n "$REFRESH_TOKEN" ] && echo "YES" || echo "NO")"
        echo "REFRESH_TOKEN length: ${#REFRESH_TOKEN}"
        echo "TURSO_SDE_URL is set: $([ -n "$TURSO_SDE_URL" ] && echo "YES" || echo "NO")"
        echo "TURSO_SDE_TOKEN is set: $([ -n "$TURSO_SDE_TOKEN" ] && echo "YES" || echo "NO")"
        echo "TURSO_FITTING_URL is set: $([ -n "$TURSO_FITTING_URL" ] && echo "YES" || echo "NO")"
        echo "TURSO_FITTING_TOKEN is set: $([ -n "$TURSO_FITTING_TOKEN" ] && echo "YES" || echo "NO")"
        echo "TURSO_WCMKTNEWKEEP_URL is set (primary): $([ -n "$TURSO_WCMKTNEWKEEP_URL" ] && echo "YES" || echo "NO")"
        echo "TURSO_WCMKTNEWKEEP_TOKEN is set (primary): $([ -n "$TURSO_WCMKTNEWKEEP_TOKEN" ] && echo "YES" || echo "NO")"
        echo "TURSO_WCMKTNORTH_URL is set (deployment): $([ -n "$TURSO_WCMKTNORTH_URL" ] && echo "YES" || echo "NO")"
        echo "TURSO_WCMTNORTH_TOKEN is set (deployment): $([ -n "$TURSO_WCMKTNORTH_TOKEN" ] && echo "YES" || echo "NO")"
        echo "TURSO_WCMKTPROD_URL is set (market3): $([ -n "$TURSO_WCMKTPROD_URL" ] && echo "YES" || echo "NO")"
        echo "TURSO_WCMKTPROD_TOKEN is set (market3): $([ -n "$TURSO_WCMKTPROD_TOKEN" ] && echo "YES" || echo "NO")"
        echo "JANICE_KEY is set: $([ -n "$JANICE_KEY" ] && echo "YES" || echo "NO")"

    - name: Run market data collection
      env:
        MKTS_QUIET: "1"
      run: |
        HISTORY_FLAG=""
        if [ "${{ github.event.inputs.include_history }}" = "true" ]; then
          HISTORY_FLAG="--history"
        elif [ "$(date -u +%H)" = "12" ]; then
          # Run with --history flag at 12:00 UTC
          HISTORY_FLAG="--history"
        fi
        echo "Running: uv run mkts-backend update-markets --market=${{ matrix.market }} $HISTORY_FLAG"
        uv run mkts-backend update-markets --market=${{ matrix.market }} $HISTORY_FLAG
      timeout-minutes: 15

    # Save this leg's own market DB. Immutable daily key: only the first successful
    # run per market per day actually writes; later runs no-op on the existing entry.
    - name: Save market database cache
      uses: actions/cache/save@v5
      if: success()
      with:
        path: |
          ${{ steps.dbfile.outputs.db }}
          ${{ steps.dbfile.outputs.db }}-info
        key: turso-dbs-v3-mkt-${{ matrix.market }}-${{ steps.cachedate.outputs.date }}

    # Save the shared SDE + fitting DBs from the primary leg ONLY, so this key has a
    # single writer and the deployment/market3 legs never race to reserve it.
    - name: Save shared databases cache
      uses: actions/cache/save@v5
      if: success() && matrix.market == 'primary'
      with:
        path: |
          sdelite.db
          sdelite.db-info
          wcfitting.db
          wcfitting.db-info
        key: turso-dbs-v3-shared-${{ steps.cachedate.outputs.date }}

    - name: Upload logs as artifacts
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: market-data-logs-${{ matrix.market }}-${{ github.run_number }}
        path: logs/
        retention-days: 7

    - name: Clean up sensitive files
      if: always()
      run: |
        rm -f wcdoctrines-1f629d861c2f.json
        rm -f token.json
        rm -f .env
        rm -f creds.json
